<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Contruent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css" />
  <link rel="stylesheet" href="components/tokens.css" />
  <link rel="stylesheet" href="components/styles.css" />
</head>
<body>

  <div id="top-nav-mount"></div>
  <script src="components/top-nav.js"></script>
  <script>renderTopNav({ activeItem: 'projects' });</script>

  <!-- ===== MAIN ===== -->
  <main class="proj-main">

    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="home.html">Home</a>
    </div>

    <!-- Page title -->
    <h1 class="proj-title">Projects</h1>

    <!-- Toolbar: tabs left, controls right -->
    <div class="proj-toolbar">
      <div class="proj-tabs">
        <button class="proj-tab active" id="tabAll" onclick="switchProjTab('all')">All</button>
        <button class="proj-tab" id="tabFavorites" onclick="switchProjTab('favorites')">Favorites</button>
      </div>
      <div class="proj-toolbar-right">
        <button class="filter-btn">
          <i class="pi pi-filter"></i>
          Filters
        </button>
        <div class="search-wrap">
          <input
            class="search-input"
            type="text"
            placeholder="Search..."
            id="projSearch"
            oninput="filterProjects()"
            aria-label="Search projects"
          />
          <i class="pi pi-search search-icon"></i>
        </div>
      </div>
    </div>

    <!-- Data table -->
    <div class="table-wrap">
      <table class="proj-table" id="projTable">
        <thead>
          <tr>
            <th class="col-sort">
              <div class="col-sort-header">
                <button class="sort-icon-btn asc" onclick="sortProjects()" aria-label="Sort" id="sortBtn">
                  <i class="pi pi-arrow-up"></i>
                </button>
              </div>
            </th>
            <th class="col-fav"></th>
            <th class="col-id">
              <div class="th-sort" onclick="sortByCol('id')">ID <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-name">
              <div class="th-sort" onclick="sortByCol('name')">Project name <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-access">
              <div class="th-sort" onclick="sortByCol('access')">Last accesses <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-mgr">
              <div class="th-sort" onclick="sortByCol('manager')">Manager <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-budget col-num">
              <div class="th-sort th-two-line" onclick="sortByCol('budget')">Approved<br>budget <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-etc col-num">
              <div class="th-sort" onclick="sortByCol('etc')">ETC <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-start">
              <div class="th-sort" onclick="sortByCol('start')">Start <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-finish">
              <div class="th-sort" onclick="sortByCol('finish')">Finish <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-pct">
              <div class="th-sort" onclick="sortByCol('pct')">% Completed <i class="pi pi-sort"></i></div>
            </th>
            <th class="col-action"></th>
          </tr>
        </thead>
        <tbody id="projTbody">
          <!-- Rendered by JS -->
        </tbody>
      </table>
      <div class="table-empty" id="tableEmpty" style="display:none">No projects found.</div>
    </div>

  </main>

  <script src="components/ai-panel.js"></script>
  <script src="components/script.js"></script>
  <script>
    /* ===== PROJECT DATA ===== */
    const PROJECTS = [
      { id: '9810...2024', name: 'Project 001', access: 'Apr 12, 2024 – 01:34PM', manager: 'Iara Moran', initials: 'IM', budget: '18.4M', budgetNum: 18.4, etc: '18.4M', etcNum: 18.4, start: 'Apr 12, 2024', finish: 'Apr 12, 2024', pct: 68, favorite: true },
      { id: '9810...2024', name: 'Project 002', access: 'Apr 12, 2024 – 01:34PM', manager: 'Iara Moran', initials: 'IM', budget: '18.4M', budgetNum: 18.4, etc: '18.4M', etcNum: 18.4, start: 'Apr 12, 2024', finish: 'Apr 12, 2024', pct: 68, favorite: false },
      { id: '9810...2024', name: 'Project 003',      access: 'Apr 12, 2024 – 01:34PM', manager: 'Iara Moran', initials: 'IM', budget: '18.4M', budgetNum: 18.4, etc: '18.4M', etcNum: 18.4, start: 'Apr 12, 2024', finish: 'Apr 12, 2024', pct: 68, favorite: false },
      { id: '9810...2024', name: 'Project 004',     access: 'Apr 12, 2024 – 01:34PM', manager: 'Iara Moran', initials: 'IM', budget: '18.4M', budgetNum: 18.4, etc: '18.4M', etcNum: 18.4, start: 'Apr 12, 2024', finish: 'Apr 12, 2024', pct: 68, favorite: true },
      { id: '9810...2024', name: 'Project 005', access: 'Apr 12, 2024 – 01:34PM', manager: 'Iara Moran', initials: 'IM', budget: '18.4M', budgetNum: 18.4, etc: '18.4M', etcNum: 18.4, start: 'Apr 12, 2024', finish: 'Apr 12, 2024', pct: 68, favorite: false },
      { id: '9810...2024', name: 'Project 006', access: 'Apr 12, 2024 – 01:34PM', manager: 'Iara Moran', initials: 'IM', budget: '18.4M', budgetNum: 18.4, etc: '18.4M', etcNum: 18.4, start: 'Apr 12, 2024', finish: 'Apr 12, 2024', pct: 68, favorite: false },
    ];

    let currentTab = 'all';
    let sortAsc = true;

    /* ===== RENDER ===== */
    function renderTable() {
      const query   = document.getElementById('projSearch').value.toLowerCase();
      const tbody   = document.getElementById('projTbody');
      const empty   = document.getElementById('tableEmpty');

      const filtered = PROJECTS.filter(p => {
        if (currentTab === 'favorites' && !p.favorite) return false;
        if (query && !p.name.toLowerCase().includes(query) && !p.id.toLowerCase().includes(query)) return false;
        return true;
      });

      tbody.innerHTML = filtered.map((p, i) => `
        <tr data-idx="${PROJECTS.indexOf(p)}">
          <td class="col-sort"></td>
          <td class="col-fav">
            <button class="star-btn" onclick="toggleFavorite(${PROJECTS.indexOf(p)})" aria-label="${p.favorite ? 'Remove from favorites' : 'Add to favorites'}">
              <i class="pi ${p.favorite ? 'pi-star-fill' : 'pi-star'}"></i>
            </button>
          </td>
          <td class="col-id" style="color:var(--default-text-secondary)">${p.id}</td>
          <td class="col-name"><a class="proj-link" href="project-home.html">${p.name}</a></td>
          <td class="col-access" style="color:var(--default-text-secondary)">${p.access}</td>
          <td class="col-mgr">
            <div class="mgr-cell">
              <span class="mgr-avatar">${p.initials}</span>
              ${p.manager}
            </div>
          </td>
          <td class="col-budget col-num">${p.budget}</td>
          <td class="col-etc col-num">${p.etc}</td>
          <td class="col-start">${p.start}</td>
          <td class="col-finish">${p.finish}</td>
          <td class="col-pct">
            <div class="pct-cell">
              <div class="pct-bar-track"><div class="pct-bar-fill" style="width:${p.pct}%"></div></div>
              <span class="pct-label">${p.pct}%</span>
            </div>
          </td>
          <td class="col-action">
            <div class="row-action-wrap">
              <button class="row-action-btn" onclick="toggleRowMenu(this)" aria-label="Row actions">
                <i class="pi pi-ellipsis-v"></i>
              </button>
              <div class="row-action-menu">
                <div class="row-action-menu-item"><i class="pi pi-eye"></i> View</div>
                <div class="row-action-menu-item"><i class="pi pi-pencil"></i> Edit</div>
                <div class="row-action-menu-item"><i class="pi pi-copy"></i> Duplicate</div>
                <div class="row-action-menu-item danger"><i class="pi pi-trash"></i> Delete</div>
              </div>
            </div>
          </td>
        </tr>
      `).join('');

      empty.style.display = filtered.length === 0 ? 'block' : 'none';
    }

    /* ===== ACTIONS ===== */
    function toggleFavorite(idx) {
      PROJECTS[idx].favorite = !PROJECTS[idx].favorite;
      renderTable();
    }

    function switchProjTab(tab) {
      currentTab = tab;
      document.getElementById('tabAll').classList.toggle('active', tab === 'all');
      document.getElementById('tabFavorites').classList.toggle('active', tab === 'favorites');
      renderTable();
    }

    function filterProjects() { renderTable(); }

    function sortProjects() {
      sortAsc = !sortAsc;
      const btn = document.getElementById('sortBtn');
      btn.querySelector('.pi').className = sortAsc ? 'pi pi-arrow-up' : 'pi pi-arrow-down';
      PROJECTS.sort((a, b) => sortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
      renderTable();
    }

    function sortByCol(col) {
      PROJECTS.sort((a, b) => {
        const va = a[col], vb = b[col];
        if (typeof va === 'number') return va - vb;
        return String(va).localeCompare(String(vb));
      });
      renderTable();
    }

    function toggleRowMenu(btn) {
      const menu = btn.nextElementSibling;
      const isOpen = menu.classList.contains('open');
      document.querySelectorAll('.row-action-menu.open').forEach(m => m.classList.remove('open'));
      if (!isOpen) menu.classList.add('open');
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.row-action-wrap')) {
        document.querySelectorAll('.row-action-menu.open').forEach(m => m.classList.remove('open'));
      }
    });

    // Initial render
    renderTable();
  </script>
</body>
</html>
