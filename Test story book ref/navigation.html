})();

/* ===== PROJECT CONTEXT ===== */
const PROJ_KEY = 'currentProject';

/* Default project shown until the user selects one */
const DEFAULT_PROJECT = { name: 'Cisco Systems', id: '0128-0919-0001', initials: 'CS', color: '#1565c0' };

function selectProject(el) {
  const proj = {
    name:     el.dataset.projName,
    id:       el.dataset.projId,
    initials: el.dataset.projInitials,
    color:    el.dataset.projColor,
  };
  localStorage.setItem(PROJ_KEY, JSON.stringify(proj));
}

function applyProjectContext() {
  let proj;
  try { proj = JSON.parse(localStorage.getItem(PROJ_KEY)); } catch (e) {}
  if (!proj || !proj.name) proj = DEFAULT_PROJECT;

  /* Text nodes */
  document.querySelectorAll('[data-proj="name"]').forEach(el => { el.textContent = proj.name; });
  document.querySelectorAll('[data-proj="id"]').forEach(el => { el.textContent = proj.id; });
  document.querySelectorAll('[data-proj="initials"]').forEach(el => { el.textContent = proj.initials; });

  /* Avatar elements get both initials + background colour */
  document.querySelectorAll('[data-proj="avatar"]').forEach(el => {
    el.textContent = proj.initials;
    el.style.background = proj.color;
  });

  /* Browser tab title: replace the first segment before " —" */
  document.title = document.title.replace(/^[^—]+—\s*/, proj.name + ' — ');
}

    /* =====================================================================

    renderLeftNav({ activeLink: 'project-home' });

    function showNavPage(name){
      var stage = document.getElementById('navStage');
      if(stage) stage.textContent = name + ' page';
    }

    /* Breadcrumb — reflects the selected menu path. Pass the trail after "Home". */
    function setBreadcrumb(parts){
      var bc = document.getElementById('navBreadcrumb');
      if(!bc) return;
      var html = '<a href="home.html">Home</a>';
      (parts || []).forEach(function(p){
        html += '<span class="bc-sep">/</span><span>' + p + '</span>';
      });
      bc.innerHTML = html;
    }

    // Collect the labels of every collapsible group/subgroup that wraps a clicked
    // link, outermost → innermost (shared by Design A and Design B markup).
    function lnavTrail(link){
      var trail = [];
      var top = link.closest('.lnav-has-children');
      var el = link.parentElement;
      while(el && el !== top){
        if(el.classList && el.classList.contains('lnav-subgroup')){
          var span = el.firstElementChild && el.firstElementChild.querySelector('.lnav-sublabel');
          if(span) trail.unshift(span.textContent.trim());
        }
        el = el.parentElement;
      }
      if(top){
        var t = top.querySelector('.lnav-parent-btn .lnav-label');
        if(t) trail.unshift(t.textContent.trim());
      }
      return trail;
    }

    // Intercept leaf/sub clicks → show "'<name>' page" + update breadcrumb (Design A only)
    document.addEventListener('click', function(e){
      if(document.body.dataset.design !== 'a') return;

        el = el.parentElement;
      }
      return trail;
    }

    // Open a rail section: render its accordion (all collapsed) or show its page if it's a leaf
    function openSectionC(key){
      var items = window.LNAV_ITEMS || [];
      var item = items.filter(function(i){ return i.key === key; })[0];
      var panel = document.getElementById('lnavcPanel');
      var navc  = document.getElementById('leftNavC');
      document.querySelectorAll('#lnavcRail .lnavc-railitem').forEach(function(b){
        b.classList.toggle('is-active', b.dataset.key === key);
      });
      if(!item) return;
      // Leaf sections (Home, Field, Drive) have no sub-menu → hide the panel, show rail only
      if(!item.children){
        panel.innerHTML = '';
        navc.classList.add('is-railonly');
        showCPage(RAIL_LABELS[item.key] || item.label);
        setBreadcrumb([item.label]);
        return;
      }
      navc.classList.remove('is-railonly');
      panel.innerHTML = item.children.map(function(c){ return panelNodeC(c, 0); }).join('');
      setBreadcrumb([item.label]);   // all categories start collapsed
    }

    renderRailC();

    // Rail clicks → open that section
    document.getElementById('lnavcRail').addEventListener('click', function(e){
      var btn = e.target.closest('.lnavc-railitem');
      if(!btn) return;
      openSectionC(btn.dataset.key);
    });

    // Panel clicks → toggle accordion groups, or activate a leaf
    document.getElementById('lnavcPanel').addEventListener('click', function(e){
      var toggle = e.target.closest('[data-toggle="1"]');
      if(toggle){
        toggle.closest('.lnavc-group').classList.toggle('is-open');
        return;
      }
      var leaf = e.target.closest('a[data-leaf]');
      if(!leaf) return;
      var href = leaf.getAttribute('href');
      if(href && href !== '#') return;   // real link → navigate
      e.preventDefault();
      this.querySelectorAll('.is-active').forEach(function(x){ x.classList.remove('is-active'); });
      leaf.classList.add('is-active');
      showCPage(leaf.dataset.leaf);
      var activeRail = document.querySelector('#lnavcRail .lnavc-railitem.is-active');
      var section = activeRail ? sectionLabelC(activeRail.dataset.key) : '';
      setBreadcrumb([section].concat(lnavcTrail(leaf), [leaf.dataset.leaf]));
    });

    /* =====================================================================
       Design switcher
       ===================================================================== */
    // Collapse toggle for the ribbon sidebar (mirrors the component's toggleLeftNav)
    function toggleLeftNavB(){
      var collapsed = !document.body.classList.contains('lnav-collapsed');
      syncLnavCollapsed(collapsed);
    }
    // Keep both sidebars + content margin in one collapse state
    function syncLnavCollapsed(collapsed){
      document.body.classList.toggle('lnav-collapsed', collapsed);
      var a = document.getElementById('leftNav');  if(a) a.dataset.collapsed = collapsed ? 'true' : 'false';
      var b = document.getElementById('leftNavB'); if(b) b.dataset.collapsed = collapsed ? 'true' : 'false';
    }

    function switchDesign(d){
      document.body.dataset.design = d;
      document.querySelectorAll('.ndt-btn').forEach(function(b){
        b.classList.toggle('is-active', b.dataset.design === d);
      });
      // keep the visible sidebar's collapse state in sync with the body
      syncLnavCollapsed(document.body.classList.contains('lnav-collapsed'));
      if(d === 'b'){
        if(!document.querySelector('#leftNavB .lnav-sublink.lnav-sublink-active')){
          var de = document.querySelector('#leftNavB .lnav-sublink[data-cat="data-entry"]');
          if(de){ setLnavActive(de); openCategory('data-entry'); }   // default: Data Entry tabs
        }
      }
      if(d === 'c'){
        if(!document.querySelector('#lnavcRail .lnavc-railitem.is-active')){
          openSectionC('cost');   // default: Cost section, Data Entry expanded
        }
      }
    }
  </script>
</body>
